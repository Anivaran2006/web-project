<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:black;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.glow-bg{
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,rgba(255,215,0,0.2),transparent 70%);
animation:pulse 3s infinite ease-in-out;
}

@keyframes pulse{
0%,100{transform:scale(1);}
50%{transform:scale(1.2);}
}

.intro-content{
text-align:center;
}

.ganesha{
font-size:80px;
color:#ffd700;
animation:fadeScale 2s forwards;
}

.mantra{
color:#ffd700;
margin-top:10px;
animation:fadeUp 2s forwards 1s;
}

.intro-title{
font-family:'Playfair Display',serif;
font-size:40px;
margin-top:15px;
color:white;
animation:fadeUp 2s forwards 1.5s;
}

@keyframes fadeScale{
from{opacity:0; transform:scale(0.6);}
to{opacity:1;}
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

/* SLIDER */
.slider{
display:flex;
width:500vw;
height:100vh;
transition:1s ease;
}

.slide{
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
}

.bg{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
filter:brightness(0.7);
animation:zoom 12s ease-in-out infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.15);}
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,0.8),rgba(0,0,0,0.2));
}

.content{
position:absolute;
bottom:15%;
left:50%;
transform:translateX(-50%);
text-align:center;
color:white;
width:90%;
max-width:400px;
}

h1{
font-family:'Playfair Display',serif;
font-size:40px;
color:#ffd700;
}

button{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:25px;
background:#ffd700;
color:black;
font-weight:bold;
cursor:pointer;
}

.progress{
position:fixed;
top:0;
left:0;
height:4px;
background:gold;
width:0%;
}

@media(max-width:600px){
h1{font-size:28px;}
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<div class="glow-bg"></div>
<div class="intro-content">
<div class="ganesha">ॐ</div>
<p class="mantra">श्री गणेशाय नमः</p>
<h1 class="intro-title">Wedding Invitation</h1>
</div>
</div>

<div class="progress" id="progress"></div>

<div class="slider" id="slider">

<!-- SLIDE 1 -->
<div class="slide">
<div class="bg" style="background-image:url('https://images.unsplash.com/photo-1600096194534-95cf5ece04cf')"></div>
<div class="overlay"></div>
<div class="content">
<h1>Welcome</h1>
<p>Join us in celebration</p>
</div>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<div class="bg" style="background-image:url('https://images.unsplash.com/photo-1598275277521-1885382fda0c')"></div>
<div class="overlay"></div>
<div class="content">
<h1>Kirti Sharma ❤️ Hrithik Sharma</h1>
<p>20 December 2026</p>
</div>
</div>

<!-- SLIDE 3 -->
<div class="slide">
<div class="bg" style="background-image:url('https://images.unsplash.com/photo-1583939003579-730e3918a45a')"></div>
<div class="overlay"></div>
<div class="content">
<h1>Functions</h1>
<p>Haldi • Mehndi • Sangeet</p>
</div>
</div>

<!-- SLIDE 4 -->
<div class="slide">
<div class="bg" style="background-image:url('https://images.unsplash.com/photo-1600172454132-1d6a5c8df1e8')"></div>
<div class="overlay"></div>
<div class="content">
<h1>The Wedding</h1>
<p>Celebrating Forever</p>
</div>
</div>

<!-- SLIDE 5 -->
<div class="slide">
<div class="bg" style="background-image:url('https://images.unsplash.com/photo-1529634899881-1f7c6c3a3b7a')"></div>
<div class="overlay"></div>
<div class="content">
<h1>RSVP</h1>
<input placeholder="Your Name" style="padding:10px;border-radius:10px;border:none;"><br>
<select style="padding:10px;border-radius:10px;border:none;margin-top:10px;">
<option>Will you attend?</option>
<option>Yes</option>
<option>No</option>
</select><br>
<button onclick="submitRSVP()">Submit</button>
</div>
</div>

</div>

<script>

/* intro */
setTimeout(()=>{
let intro=document.getElementById("intro");
intro.style.opacity="0";
intro.style.transition="1s";
setTimeout(()=>intro.style.display="none",1000);
},4000);

/* slider */
let i=0;
setInterval(()=>{
if(i<4){
i++;
document.getElementById("slider").style.transform="translateX(-"+i*100+"vw)";
}
},4000);

/* RSVP */
function submitRSVP(){
document.body.innerHTML="<div style='display:flex;justify-content:center;align-items:center;height:100vh;background:black;color:white;'><h1 style='color:gold;'>Thank You 💖</h1></div>";
}

</script>

</body>
</html>
